<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="450" fill="#0a0e17"/>

  <!-- Grid -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(0, 255, 136, 0.05)" stroke-width="1"/>
    </pattern>
    <linearGradient id="paint0_linear" x1="0" y1="0" x2="800" y2="450" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00ff88"/>
      <stop offset="1" stop-color="#00d4ff"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#grid)"/>

  <!-- Sidebar -->
  <rect width="200" height="450" fill="#111827" fill-opacity="0.8"/>
  <rect x="20" y="30" width="30" height="30" rx="6" fill="url(#paint0_linear)"/>
  <rect x="60" y="35" width="100" height="20" rx="4" fill="#e4e8ef" fill-opacity="0.1"/>

  <rect x="20" y="80" width="160" height="12" rx="2" fill="#8b949e" fill-opacity="0.3"/>
  <rect x="20" y="105" width="140" height="12" rx="2" fill="#8b949e" fill-opacity="0.2"/>
  <rect x="20" y="130" width="150" height="12" rx="2" fill="#8b949e" fill-opacity="0.2"/>
  <rect x="20" y="155" width="130" height="12" rx="2" fill="#8b949e" fill-opacity="0.2"/>

  <!-- Main Content Area -->
  <rect x="230" y="30" width="540" height="60" rx="8" fill="#111827" stroke="#21293a"/>
  <rect x="250" y="45" width="200" height="20" rx="4" fill="url(#paint0_linear)"/>
  <rect x="250" y="72" width="300" height="10" rx="2" fill="#8b949e" fill-opacity="0.4"/>

  <!-- Cards Section -->
  <rect x="230" y="110" width="260" height="140" rx="10" fill="#1a2332" stroke="#21293a"/>
  <rect x="250" y="130" width="120" height="15" rx="4" fill="#ff3860"/>
  <rect x="250" y="155" width="220" height="10" rx="2" fill="#e4e8ef" fill-opacity="0.8"/>
  <rect x="250" y="175" width="200" height="10" rx="2" fill="#e4e8ef" fill-opacity="0.8"/>
  <rect x="250" y="200" width="220" height="30" rx="4" fill="#0d1117"/>

  <rect x="510" y="110" width="260" height="140" rx="10" fill="#1a2332" stroke="#21293a"/>
  <rect x="530" y="130" width="120" height="15" rx="4" fill="#ff6b35"/>
  <rect x="530" y="155" width="220" height="10" rx="2" fill="#e4e8ef" fill-opacity="0.8"/>
  <rect x="530" y="175" width="200" height="10" rx="2" fill="#e4e8ef" fill-opacity="0.8"/>
  <rect x="530" y="200" width="220" height="30" rx="4" fill="#0d1117"/>

  <!-- Code Block Example -->
  <rect x="230" y="270" width="540" height="150" rx="10" fill="#0d1117" stroke="#21293a"/>
  <rect x="245" y="285" width="100" height="12" rx="2" fill="#a855f7" fill-opacity="0.8"/>
  <rect x="245" y="310" width="450" height="8" rx="2" fill="#00ff88" fill-opacity="0.4"/>
  <rect x="245" y="330" width="400" height="8" rx="2" fill="#e4e8ef" fill-opacity="0.3"/>
  <rect x="245" y="350" width="420" height="8" rx="2" fill="#e4e8ef" fill-opacity="0.3"/>
  <rect x="245" y="370" width="380" height="8" rx="2" fill="#e4e8ef" fill-opacity="0.3"/>
  <rect x="245" y="390" width="440" height="8" rx="2" fill="#00d4ff" fill-opacity="0.4"/>

  <!-- Logo text -->
  <text x="60" y="52" fill="#e4e8ef" font-family="Outfit, sans-serif" font-size="14" font-weight="bold">Solidity Security</text>
  <text x="250" y="59" fill="#0a0e17" font-family="Outfit, sans-serif" font-size="16" font-weight="bold">Reentrancy Attack</text>
</svg>
